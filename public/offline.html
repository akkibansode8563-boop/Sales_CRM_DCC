<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Sales CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0F172A; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .container { max-width: 320px; }
    .icon { font-size: 4rem; margin-bottom: 24px; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
    p { color: #94A3B8; line-height: 1.6; margin-bottom: 24px; font-size: 0.9rem; }
    button { background: linear-gradient(135deg, #1E3A8A, #0D9488); color: white; border: none; border-radius: 12px; padding: 14px 32px; font-weight: 700; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Sales CRM needs an internet connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
