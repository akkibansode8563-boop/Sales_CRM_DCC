name: DCC Sales CRM CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    # A production CRM must not have failing builds or lint errors
    - name: Run Build (Verify Webpack/Vite Bundle)
      run: npm run build
      
    # Optionally run basic tests if they exist
    # - name: Run Unit Tests
    #   run: npm test

