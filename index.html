<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2563EB" />
  <meta name="description" content="DCC SalesForce — Field Sales Automation" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DCC SFA" />

  <!-- Preconnect to critical origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Icons -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

  <title>DCC SalesForce</title>

  <!-- Service Worker is auto-registered by VitePWA (injected at build time) -->
  <!-- Updates happen silently in background — no manual version bumping needed -->

  <!-- Critical CSS inline for instant paint (prevents FOUC) -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:#F5F7FB}
    #root{height:100%}
    /* Skeleton loader while JS hydrates */
    .app-loading{display:flex;align-items:center;justify-content:center;height:100vh;
      background:linear-gradient(135deg,#0F172A,#1E3A8A)}
    .app-loading-dot{width:10px;height:10px;border-radius:50%;background:#60A5FA;
      animation:ldot 1.2s ease-in-out infinite;margin:0 4px}
    .app-loading-dot:nth-child(2){animation-delay:.2s}
    .app-loading-dot:nth-child(3){animation-delay:.4s}
    @keyframes ldot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
  <div id="root">
    <!-- Instant loading skeleton shown before React hydrates -->
    <div class="app-loading" id="app-skeleton">
      <div class="app-loading-dot"></div>
      <div class="app-loading-dot"></div>
      <div class="app-loading-dot"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Remove skeleton once React mounts
    window.__removeSkeleton = () => {
      const s = document.getElementById('app-skeleton')
      if (s) s.remove()
    }
  </script>
</body>
</html>
